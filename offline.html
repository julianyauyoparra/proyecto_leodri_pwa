<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#d80000">
    <title>LEODRI — Sin conexión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #fff;
            color: #2d2d2d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .offline {
            max-width: 320px;
        }
        .offline__logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 16px;
        }
        .offline__titulo {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .offline__texto {
            font-size: 0.9375rem;
            line-height: 1.5;
            color: #555;
            margin-bottom: 24px;
        }
        .offline__btn {
            display: inline-block;
            padding: 12px 24px;
            background: #2d2d2d;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
        }
    </style>
</head>
<body>
    <div class="offline">
        <img class="offline__logo" src="assets/icons/icon-192.png" alt="LEODRI" width="72" height="72">
        <h1 class="offline__titulo">Sin conexión</h1>
        <p class="offline__texto">
            No hay internet en este momento. Si ya abriste el catálogo antes, vuelve a la página principal.
        </p>
        <a class="offline__btn" href="./">Ir al catálogo</a>
    </div>
</body>
</html>
